<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#c8b2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ムーニアンズ">
    <title>ぴょんぴーの大冒険</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/app-icon-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game-wrap" aria-label="ぴょんぴーの大冒険 game">
        <canvas id="game" width="1280" height="720"></canvas>
        <button id="fullscreenButton" class="fullscreen-button" type="button" aria-label="Fullscreen">全画面</button>
        <div id="installHint" class="install-hint hidden" role="status"></div>
        <div class="touch-controls" aria-label="Touch controls">
          <div class="touch-side touch-side-left">
            <button class="touch-small" data-key="Select" type="button" aria-label="Select">SELECT</button>
            <div class="touch-dpad" aria-label="Move">
              <button class="touch-button up" data-key="ArrowUp" type="button" aria-label="Up">&uarr;</button>
              <button class="touch-button left" data-key="ArrowLeft" type="button" aria-label="Left">&larr;</button>
              <button class="touch-button down" data-key="ArrowDown" type="button" aria-label="Down">&darr;</button>
              <button class="touch-button right" data-key="ArrowRight" type="button" aria-label="Right">&rarr;</button>
            </div>
          </div>
          <div class="touch-side touch-side-right">
            <button class="touch-small" data-key="Enter" type="button" aria-label="Start">START</button>
            <div class="touch-actions" aria-label="Actions">
              <button class="touch-action shoot" data-key="KeyX" type="button" aria-label="Shoot">X</button>
              <button class="touch-action jump" data-key="Space" type="button" aria-label="Jump">A</button>
              <button class="touch-action run" data-key="KeyB" type="button" aria-label="Dash">B</button>
            </div>
          </div>
        </div>
        <div id="overlay" class="overlay">
          <div class="language-switch" aria-label="Language">
            <button id="langJa" class="active" type="button">日本語</button>
            <button id="langEn" type="button">English</button>
          </div>
          <div class="control-switch" aria-label="Control mode">
            <button id="modeIphone" type="button" data-control-mode="iphone">iPhone</button>
            <button id="modeIpad" type="button" data-control-mode="ipad">iPad</button>
            <button id="modePc" type="button" data-control-mode="pc">PC</button>
          </div>
          <img class="brand-logo" src="assets/moonians-logo.png" alt="ムーニアンズ">
          <h1 class="game-title">ぴょんぴーの大冒険</h1>
          <p>移動: ← → / A D、ジャンプ: Space、ダッシュ: Shift、攻撃: J / X</p>
          <button id="startButton" type="button">Start</button>
        </div>
      </section>
      <div class="hud" aria-live="polite">
        <span id="stageLabel">ステージ <strong id="stageCount">1</strong></span>
        <span id="kakiLabel">柿の種 <strong id="kakiCount">0</strong></span>
        <span id="peaLabel">ピーナッツ <strong id="peaCount">0</strong></span>
        <span id="scoreLabel">スコア <strong id="scoreCount">0</strong></span>
        <span class="hp-wrap" aria-label="Lives"><strong id="lifeCount">★★★</strong></span>
        <span id="timeLabel">時間 <strong id="timeCount">120</strong></span>
      </div>
    </main>
    <script src="game.js"></script>
    <script>
      if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
